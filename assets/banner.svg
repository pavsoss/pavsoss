<svg width="1000" height="300" viewBox="0 0 1000 300" xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes pulse {
      0%, 100% { opacity: 0.05; }
      50% { opacity: 0.15; }
    }
    @keyframes dash {
      0% { stroke-dashoffset: 1000; }
      100% { stroke-dashoffset: 0; }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }
    .orb-1 { animation: pulse 4s ease-in-out infinite; }
    .orb-2 { animation: pulse 6s ease-in-out infinite reverse; }
    .line-1 { stroke-dasharray: 1000; animation: dash 10s linear infinite; }
    .text-g { animation: float 6s ease-in-out infinite; }
  </style>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050508" />
      <stop offset="50%" stop-color="#0a0a0e" />
      <stop offset="100%" stop-color="#050508" />
    </linearGradient>
    <linearGradient id="purpleGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8B5CF6" />
      <stop offset="100%" stop-color="#A855F7" />
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#8B5CF6" stroke-opacity="0.05" stroke-width="1" />
    </pattern>
  </defs>
  
  <rect width="100%" height="100%" fill="url(#bg)" />
  <rect width="100%" height="100%" fill="url(#grid)" />
  
  <!-- Decorative glowing orbs (with animation) -->
  <circle class="orb-1" cx="150" cy="80" r="150" fill="#8B5CF6" />
  <circle class="orb-2" cx="850" cy="250" r="200" fill="#A855F7" />
  
  <!-- Cyber lines -->
  <path class="line-1" d="M 0 250 L 300 250 L 350 200 L 1000 200" fill="none" stroke="url(#purpleGlow)" stroke-width="3" stroke-opacity="0.6" />
  <path d="M 0 260 L 290 260 L 340 210 L 1000 210" fill="none" stroke="#8B5CF6" stroke-width="1" stroke-opacity="0.3" />
  
  <!-- Accents -->
  <rect x="350" y="195" width="40" height="10" fill="#A855F7" fill-opacity="0.8" />
  <rect x="400" y="197" width="10" height="6" fill="#8B5CF6" fill-opacity="0.8" />
  
  <g class="text-g" transform="translate(80, 140)">
    <text x="0" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="900" fill="#ffffff" letter-spacing="4">PAAVNI</text>
    <text x="5" y="45" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="500" fill="#A855F7" letter-spacing="6">AI ENGINEER • OPEN SOURCE • FULL STACK</text>
  </g>
</svg>
