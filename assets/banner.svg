<svg width="1000" height="350" viewBox="0 0 1000 350" xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes drift1 { 0% { transform: translateX(0px); } 100% { transform: translateX(-300px); } }
    @keyframes drift2 { 0% { transform: translateX(0px); } 100% { transform: translateX(-400px); } }
    @keyframes twinkle { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; transform: scale(1.2); } }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    @keyframes shooting {
      0% { transform: translate(1200px, -200px); opacity: 1; }
      20% { transform: translate(-200px, 1200px); opacity: 0; }
      100% { transform: translate(-200px, 1200px); opacity: 0; }
    }
    @keyframes floatText { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-5px); } }
    
    .cloud1 { animation: drift1 40s linear infinite alternate; }
    .cloud2 { animation: drift2 60s linear infinite alternate; }
    .star { animation: twinkle 3s ease-in-out infinite; }
    .star:nth-child(even) { animation-delay: 1.5s; animation-duration: 4s; }
    .shooting-star { animation: shooting 8s linear infinite; }
    .shooting-star-2 { animation: shooting 12s linear infinite; animation-delay: 4s; }
    .badges { animation: floatText 6s ease-in-out infinite; }
    .cursor { animation: blink 1s step-end infinite; }
  </style>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c1a5f5" />
      <stop offset="100%" stop-color="#9370db" />
    </linearGradient>
  </defs>
  
  <rect width="100%" height="100%" fill="url(#bg)" />
  
  <!-- Moon -->
  <circle cx="500" cy="120" r="85" fill="#f8f4ff" />
  <circle cx="500" cy="120" r="115" fill="none" stroke="#ffffff" stroke-width="2" stroke-opacity="0.4" />
  <circle cx="500" cy="120" r="145" fill="none" stroke="#ffffff" stroke-width="1" stroke-opacity="0.15" />

  <!-- Stars -->
  <g class="star" fill="#ffffff">
    <path d="M 120 50 Q 125 60 135 60 Q 125 60 125 70 Q 125 60 115 60 Q 125 60 120 50 Z" />
    <path d="M 850 80 Q 855 90 865 90 Q 855 90 855 100 Q 855 90 845 90 Q 855 90 850 80 Z" />
    <path d="M 300 30 Q 303 35 308 35 Q 303 35 303 40 Q 303 35 298 35 Q 303 35 300 30 Z" />
    <path d="M 750 40 Q 753 45 758 45 Q 753 45 753 50 Q 753 45 748 45 Q 753 45 750 40 Z" />
    <circle cx="200" cy="80" r="2" />
    <circle cx="400" cy="50" r="1.5" />
    <circle cx="600" cy="60" r="2" />
    <circle cx="900" cy="150" r="1.5" />
  </g>

  <!-- Shooting Stars -->
  <line class="shooting-star" x1="0" y1="0" x2="-80" y2="80" stroke="#ffffff" stroke-width="2" stroke-linecap="round" />
  <line class="shooting-star-2" x1="0" y1="0" x2="-100" y2="100" stroke="#f48fb1" stroke-width="1.5" stroke-linecap="round" />
  
  <!-- Clouds (Bottom) -->
  <g class="cloud1" fill="#ffb6c1" opacity="0.8">
    <circle cx="100" cy="350" r="120" />
    <circle cx="350" cy="380" r="160" />
    <circle cx="650" cy="360" r="140" />
    <circle cx="900" cy="370" r="160" />
    <circle cx="1200" cy="350" r="120" />
  </g>
  
  <g class="cloud2" fill="#ffffff" opacity="0.7">
    <circle cx="50" cy="370" r="90" />
    <circle cx="300" cy="400" r="130" />
    <circle cx="550" cy="380" r="110" />
    <circle cx="850" cy="390" r="120" />
    <circle cx="1150" cy="370" r="90" />
  </g>

  <!-- Content text & badges overlay -->
  <g class="badges" transform="translate(500, 195)" text-anchor="middle">
    <!-- Main Name Title with simulated typing cursor -->
    <text x="0" y="-10" font-family="'Segoe UI', -apple-system, sans-serif" font-size="52" font-weight="900" fill="#581c87" letter-spacing="2">
      Hi! I'm Paavni<tspan class="cursor">|</tspan>
    </text>
    
    <!-- Badge 1 Background -->
    <rect x="-240" y="20" width="480" height="28" rx="14" fill="#ffffff" fill-opacity="0.9" stroke="#7e22ce" stroke-width="1.5" />
    <!-- Badge 1 Text -->
    <text x="0" y="39" font-family="'Segoe UI', -apple-system, sans-serif" font-size="12" font-weight="700" fill="#7e22ce" letter-spacing="1">AI/ML &amp; FULL-STACK • CSE-AI @ IGDTUW '29</text>
    
    <!-- Badge 2 Background -->
    <rect x="-260" y="58" width="520" height="28" rx="14" fill="#f8f4ff" fill-opacity="0.9" stroke="#db2777" stroke-width="1.5" />
    <!-- Badge 2 Text -->
    <text x="0" y="77" font-family="'Segoe UI', -apple-system, sans-serif" font-size="12" font-weight="700" fill="#db2777" letter-spacing="1">OPEN SOURCE @ GSSoC'26 &amp; SSoC'26 • COMPUTER VISION</text>
  </g>
</svg>
