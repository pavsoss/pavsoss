<svg width="1000" height="350" viewBox="0 0 1000 350" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Arrowhead for the doodle -->
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ffffff" />
    </marker>
    <!-- Translucent gradient overlay for readability -->
    <linearGradient id="overlay" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2d1b4e" stop-opacity="0.85" />
      <stop offset="40%" stop-color="#2d1b4e" stop-opacity="0.5" />
      <stop offset="100%" stop-color="#2d1b4e" stop-opacity="0" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Image (User must provide bg.png) -->
  <image href="bg.png" width="1000" height="350" preserveAspectRatio="xMidYMid slice" />
  
  <!-- Overlay -->
  <rect width="1000" height="350" fill="url(#overlay)" />

  <!-- LEFT SIDE: Text Content -->
  <g transform="translate(50, 70)">
    <text x="0" y="0" font-family="'Segoe UI', -apple-system, sans-serif" font-size="20" font-weight="600" fill="#e9d5ff">👋 Hi, I'm</text>
    <text x="0" y="45" font-family="'Segoe UI', -apple-system, sans-serif" font-size="52" font-weight="900" fill="#ffffff" letter-spacing="2">Paavni Bansal</text>
    
    <text x="0" y="75" font-family="'Segoe UI', -apple-system, sans-serif" font-size="16" font-weight="600" fill="#d8b4fe">Computer Science (AI) @ IGDTUW</text>
    
    <text x="0" y="110" font-family="'Segoe UI', -apple-system, sans-serif" font-size="14" font-weight="400" fill="#f3e8ff">Building AI-powered products,</text>
    <text x="0" y="130" font-family="'Segoe UI', -apple-system, sans-serif" font-size="14" font-weight="400" fill="#f3e8ff">backend systems,</text>
    <text x="0" y="150" font-family="'Segoe UI', -apple-system, sans-serif" font-size="14" font-weight="400" fill="#f3e8ff">and meaningful developer tools.</text>

    <!-- Pill Badges -->
    <g transform="translate(0, 180)">
      <rect x="0" y="0" width="175" height="24" rx="12" fill="#7e22ce" fill-opacity="0.4" stroke="#c084fc" stroke-width="1" />
      <text x="12" y="16" font-family="'Segoe UI', -apple-system, sans-serif" font-size="11" font-weight="600" fill="#ffffff">🎓 CSE-AI @ IGDTUW '29</text>

      <rect x="185" y="0" width="175" height="24" rx="12" fill="#7e22ce" fill-opacity="0.4" stroke="#c084fc" stroke-width="1" />
      <text x="197" y="16" font-family="'Segoe UI', -apple-system, sans-serif" font-size="11" font-weight="600" fill="#ffffff">🌱 Open Source Contributor</text>

      <rect x="0" y="32" width="175" height="24" rx="12" fill="#7e22ce" fill-opacity="0.4" stroke="#c084fc" stroke-width="1" />
      <text x="12" y="48" font-family="'Segoe UI', -apple-system, sans-serif" font-size="11" font-weight="600" fill="#ffffff">🤖 AI • Backend • Full Stack</text>

      <rect x="185" y="32" width="135" height="24" rx="12" fill="#7e22ce" fill-opacity="0.4" stroke="#c084fc" stroke-width="1" />
      <text x="197" y="48" font-family="'Segoe UI', -apple-system, sans-serif" font-size="11" font-weight="600" fill="#ffffff">✨ Web3 Explorer</text>
    </g>
  </g>

  <!-- RIGHT SIDE: Handwritten Doodle Quote -->
  <g transform="translate(720, 140)">
    <text x="0" y="0" font-family="'Comic Sans MS', 'Bradley Hand', cursive" font-size="18" font-weight="500" fill="#ffffff" transform="rotate(-6)" filter="url(#glow)">Turning ideas into impact ♡</text>
    
    <!-- Curved arrow pointing toward the left -->
    <path d="M 20 20 Q 0 45 -50 45" fill="none" stroke="#ffffff" stroke-width="2" marker-end="url(#arrow)" stroke-dasharray="3 3" />
    
    <!-- Tiny doodles -->
    <text x="-30" y="-30" font-family="'Comic Sans MS', cursive" font-size="20" fill="#ffffff" transform="rotate(15)">✦</text>
    <text x="210" y="20" font-family="'Comic Sans MS', cursive" font-size="16" fill="#ffffff" transform="rotate(-15)">⋆</text>
    <text x="170" y="-40" font-family="'Comic Sans MS', cursive" font-size="22" fill="#ffffff" transform="rotate(10)">⌁</text>
  </g>
</svg>
