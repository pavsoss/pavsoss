<svg width="1000" height="120" viewBox="0 0 1000 120" xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes wave {
      0%, 100% { transform: translateY(0) scaleY(1); }
      50% { transform: translateY(2px) scaleY(1.02); }
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    .wave-1 { animation: wave 6s ease-in-out infinite; transform-origin: bottom; }
    .wave-2 { animation: wave 8s ease-in-out infinite reverse; transform-origin: bottom; }
    .blink-dot { animation: blink 2s step-end infinite; }
  </style>
  <defs>
    <linearGradient id="footer-bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#050508" />
      <stop offset="100%" stop-color="#0a0a0e" />
    </linearGradient>
    <linearGradient id="purpleGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8B5CF6" />
      <stop offset="100%" stop-color="#A855F7" />
    </linearGradient>
  </defs>
  
  <rect width="1000" height="120" fill="url(#footer-bg)" />
  
  <!-- Cyberwave animated -->
  <path class="wave-1" d="M 0 60 Q 250 120 500 60 T 1000 60 L 1000 120 L 0 120 Z" fill="#8B5CF6" fill-opacity="0.05" />
  <path class="wave-2" d="M 0 70 Q 250 110 500 70 T 1000 70 L 1000 120 L 0 120 Z" fill="#A855F7" fill-opacity="0.03" />
  
  <path class="wave-1" d="M 0 58 Q 250 118 500 58 T 1000 58" fill="none" stroke="url(#purpleGlow)" stroke-width="1.5" stroke-opacity="0.5" />
  
  <text x="500" y="45" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#8B5CF6" text-anchor="middle" letter-spacing="4">INITIALIZING THE FUTURE // SECURE CONNECTION ESTABLISHED <tspan class="blink-dot">_</tspan></text>
  
  <circle cx="210" cy="41" r="3" fill="#A855F7" class="blink-dot" />
  <circle cx="790" cy="41" r="3" fill="#8B5CF6" class="blink-dot" />
</svg>
